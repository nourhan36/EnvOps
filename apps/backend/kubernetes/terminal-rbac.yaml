apiVersion: v1
kind: Namespace
metadata:
  name: envops-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: envops-backend
  namespace: envops-system
---
# The backend must discover sandbox Pods and create pods/exec sessions.
# This is intentionally NOT cluster-admin.
#
# TODO(Security hardening): this ClusterRoleBinding gives the backend exec access
# across namespaces. A stricter final design is for Role 2 to create a Role and
# RoleBinding inside each sandbox namespace, bound to envops-system/envops-backend.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: envops-terminal-access
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: envops-terminal-access
subjects:
  - kind: ServiceAccount
    name: envops-backend
    namespace: envops-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: envops-terminal-access
