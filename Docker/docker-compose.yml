services:
  postgres:
    image: postgres:16
    container_name: envops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: envops_admin
      POSTGRES_PASSWORD: local_dev_password
      POSTGRES_DB: envops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: envops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

# LocalStack (Floci)
  localstack:
    image: localstack/localstack:3
    container_name: envops-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      - SERVICES=secretsmanager
      - DEBUG=1
      - PERSISTENCE=1
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  pgdata:
  redisdata:
  localstack_data:
