version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: envops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: envops_admin
      POSTGRES_PASSWORD: local_dev_password
      POSTGRES_DB: envops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: envops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
volumes:
  pgdata:
  redisdata: