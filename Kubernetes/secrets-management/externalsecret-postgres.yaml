apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: envops-core
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: localstack-secrets-store
    kind: SecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: envops/postgres-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: envops/postgres-credentials
        property: password
    - secretKey: dbname
      remoteRef:
        key: envops/postgres-credentials
        property: dbname